history=@Invalid()
# inpstrX - Input stream configuration. 
# inpstr1 - rover.
# inpstr2 - base
# inpstr3 - corrections.
# X-format:
# Receiver Protocol:
# ubx - u-blox
# rtcm3 - corrections
# oem4 - NovAtel
# sbf - Septentrio

# Connection type (X-type):
# serial - COM port
# file - log file
# tcpcli - TCP client
# tcpsvr - TCP server
# ntripcli - NTRIP corrections

# Path (X-path)
# inpstr1-format     =ubx        # (0:rtcm2,1:rtcm3,2:oem4,3:oem3,4:ubx,5:ss2,6:hemis,7:skytraq,8:gw10,9:javad,10:nvs,11:binex,12:rt17,13:sbf,14:cmr,17:sp3)
# inpstr1-path       =:10008
# inpstr1-type       =tcpcli     # (0:off,1:serial,2:file,3:tcpsvr,4:tcpcli,7:ntripcli,8:ftp,9:http)

# inpstr2-format     =ubx        # (0:rtcm2,1:rtcm3,2:oem4,3:oem3,4:ubx,5:ss2,6:hemis,7:skytraq,8:gw10,9:javad,10:nvs,11:binex,12:rt17,13:sbf,14:cmr,17:sp3)
# inpstr2-nmealat    =0          # (deg) 0 
# inpstr2-nmealon    =0          # (deg) 0
# inpstr2-nmeareq    =off        # (0:off,1:latlon,2:single)
# inpstr2-path       =
# inpstr2-type       =off        # (0:off,1:serial,2:file,3:tcpsvr,4:tcpcli,7:ntripcli,8:ftp,9:http)

# inpstr3-format     =rtcm3      # (0:rtcm2,1:rtcm3,2:oem4,3:oem3,4:ubx,5:ss2,6:hemis,7:skytraq,8:gw10,9:javad,10:nvs,11:binex,12:rt17,13:sbf,14:cmr,17:sp3)
# inpstr3-path       =
# inpstr3-type       =off        # (0:off,1:serial,2:file,3:tcpsvr,4:tcpcli,7:ntripcli,8:ftp,9:http)

# Output stream (outstrX):
# Defined where RTKLIB writes solution.
# Output types: file, serial, TCP, NTRIP caster.
outstr1-format     =llh        # (0:llh,1:xyz,2:enu,3:nmea)
outstr1-path       =sol1_%Y%m%d%h%M.pos
outstr1-type       =off        # (0:off,1:serial,2:file,3:tcpsvr,4:tcpcli,6:ntripsvr)

outstr2-format     =llh        # (0:llh,1:xyz,2:enu,3:nmea)
outstr2-path       =sol2_%Y%m%d%h%M.pos
outstr2-type       =off        # (0:off,1:serial,2:file,3:tcpsvr,4:tcpcli,6:ntripsvr)


Log\Enabled=false

logstr1-path       =rov_%Y%m%d%h%M.log
logstr1-type       =off        # (0:off,1:serial,2:file,3:tcpsvr,4:tcpcli,6:ntripsvr)

logstr2-path       =ref_%Y%m%d%h%M.log
logstr2-type       =off        # (0:off,1:serial,2:file,3:tcpsvr,4:tcpcli,6:ntripsvr)

logstr3-path       =cor_%Y%m%d%h%M.log
logstr3-type       =off        # (0:off,1:serial,2:file,3:tcpsvr,4:tcpcli,6:ntripsvr)

# Miscellaneous (misc-* section)
misc-buffsize      =32768      # (bytes)
misc-fswapmargin   =30         # (s)
misc-navmsgsel     =all        # (0:all,1:rover,2:base,3:corr)
misc-nmeacycle     =5000       # (ms)
misc-pppopt        =
misc-proxyaddr     =
misc-reconnect     =10000      # (ms) 10000 or 30000
misc-rnxopt1       =
misc-rnxopt2       =
misc-sbasatsel     =0          # (0:all)
misc-startcmd      =./rtkstart.sh
misc-stopcmd       =./rtkshut.sh
misc-svrcycle      =10         # (ms)
misc-timeinterp    =on         # (0:off,1:on) interpolate base position in post-processing (off, on)
misc-timeout       =30000      # (ms) 10000 or 30000

# Output formatting (out-* settings)
out-debugtrace     =5
out-degform        =deg        # degree ouput format (deg, dms) (0:deg,1:dms)
out-fieldsep       =           # output field separator
out-geoid          =internal   # (0:internal,1:egm96,2:egm08_2.5,3:egm08_1,4:gsi2000)
out-height         =ellipsoidal # (0:ellipsoidal,1:geodetic) height reference (ellipsoidal, geodetic)
out-maxsolstd      =0          # max sigma of solution output (0:all, m)
out-nmeaintv1      =0          # (s)
out-nmeaintv2      =0          # (s)
out-outhead        =on         # (0:off,1:on) output header (off, on)
out-outopt         =on         # (0:off,1:on) output solution options (off, on)
out-outsingle      =on         # (0:off,1:on)
out-outstat        =off        # (0:off,1:state,2:residual) output statistics (off, state, residual)
out-outvel         =on         # (0:off,1:on)
out-solformat      =llh        # (0:llh,1:xyz,2:enu,3:nmea) solution format (llh, xyz, enu, nmea)
out-solstatic      =single     # (0:all,1:single)
out-timeform       =hms        # time format (tow, hms) (0:tow,1:hms)
out-timendec       =3          # number of decimals in time output 3, 9
out-timesys        =gpst        # (0:gpst,1:utc,2:jst) time system (gpst, utc, jst)

pos1-dynamics      =on         # add dynamic states to kalman filter (off, on) # (0:off,1:on)
# Elevation Mask
# Reject low satellites - Reduces multipath, Improves stability. 
pos1-elmask        =15         # min sat elevation to include in solution (deg) # 5 to 15
pos1-exclsats      =           # (prn ...) sats excluded from solution (prns eg: G03 E12)
# Frequencies:
# More frequncies - Faster ambiguity fixing, Better ionosphere correction.
pos1-frequency     =l1+l2+l5+l6 # (1:l1,2:l1+l2,3:l1+l2+l5,4:l1+l2+l5+l6)
# Ionosphere Model:
# off, broadcast-model, dual-frequency estimation, TEC maps.
# Dual frequency best when available.
pos1-ionoopt       =brdc       # (0:off,1:brdc,2:sbas,3:dual-freq,4:est-stec,5:ionex-tec,6:qzs-brdc,7:qzs-lex,8:stec)
# Navigation Systems:
# TODO: Add more options.
pos1-navsys        =47         # (1:gps+2:sbas+4:glo+8:gal+16:qzs+32:bds+64:navic) # 1, 13, 15, 45, 47, 61, 7, 1 to 127 int binary number
# pos1-posmode:
# single - no corrections.
# dgps - code differential.
# kinematic - moving RTK(= Moving rover).
# static - stationary RTK
# movingbase - dual moving receivers.
# ppp-* - precise point positioning.
pos1-posmode       =kinematic  # (0:single,1:dgps,2:kinematic,3:static,4:movingbase,5:fixed,6:ppp-kine,7:ppp-static) # solution mode (single, dgps, kinematic, static, movingbase)
pos1-posopt1       =off        # (0:off,1:on)
pos1-posopt2       =off        # (0:off,1:on)
pos1-posopt3       =off        # (0:off,1:on,2:precise)
pos1-posopt4       =off        # (0:off,1:on)
pos1-posopt5       =off        # (0:off,1:on)
pos1-posopt6       =off        # (0:off,1:on)
# Sattelite Ephemeris.
# broadcast, precise (SP3), SSR corrections. Precise ephemeris improves accuracy.
pos1-sateph        =brdc       # (0:brdc,1:precise,2:brdc+sbas,3:brdc+ssrapc,4:brdc+ssrcom)
pos1-snrmask       =20         # (dBHz) # 0 , 20
pos1-snrmask_b     =off        # SNR mask base (off, on) (0:off,1:on)
pos1-snrmask_L1    =38,38,38,38,38,38,38,38,38 # 0 to 38 0 # SNR masks for different elevations  # (dBHz)
pos1-snrmask_L2    =35,35,35,35,35,35,35,35,35 # 0 to 35 SNR masks for different elevations  # (dBHz)
pos1-snrmask_L5    =35,35,35,35,35,35,35,35,35 # 0 to 35 # (dBHz)
pos1-snrmask_L6    =20,20,20,20,20,20,20,20,20
pos1-snrmask_r     =off        # (0:off,1:on)  SNR mask rover (off, on)
pos1-soltype       =combined-nophasereset # (0:forward,1:backward,2:combined,3:combined-nophasereset)
pos1-tidecorr      =0          # (1:solid+2:otl+4:spole) # (0:off,1:on,2:otl)
# Troposphere model:
# Saasstamoinen model, Estimated ZTD. 
pos1-tropopt       =saas       # (0:off,1:saas,2:sbas,3:est-ztd,4:est-ztdgrad,5:ztd)

# Ambiguity resolution (pos2-* settings) - This determines whether RTK gets fixed solution.
pos2-arelmask      =15         # min sat elevation to include in AR (deg) # 0 to 25
pos2-arfilter      =on         # (0:off,1:on)
pos2-arlockcnt     =0          # fixed hold off for adding new/re-locked sats to AR (samples) set higher if arfilter=off 0 to 30
pos2-armaxiter     =1
pos2-arminfix      =20        # (samples) adjust for sample rate # min # of fix samples to enable AR hold (samples) # 5 to 100
# AR mode - off - float only; continuous - normal RTK; instantaneous - aggressive; fix-and-hold - fix + stabilize.
pos2-armode        =fix-and-hold # Ambiguity resolution (AR) mode (off, continuous, instantaneous, fix-and-hold) (0:off,1:continuous,2:instantaneous,3:fix-and-hold)
pos2-aroutcnt      =50         # outage count to reset sat ambiguity (samples) (samples) adjust for sample rate # 1 to 50
pos2-arthres1      =0.1        # max variance of position states to attempt AR (m) # use 0.004 if data quality allows # 0.001, 0.05, 0.1, 0.9999, 1
pos2-arthres2      =0.25 # 0 or 0.25
# AR thresholds: 3 - moderate confidence, 5+ conservative.
pos2-arthres       =3.0        # minimum AR ratio for fix (m) 3, 5
pos2-arthres3      =1e-09 # log 1e-9, 1e-5, 0.1
pos2-arthres4      =1e-05 # log 0.0001, 1e-5, 0.05
pos2-arthresmax    =3
pos2-arthresmin    =3
pos2-baselen       =0          # baseline length(0:disable,m)
# pos2-basesig       =0          # baseline length sigma (m)
pos2-bdsarmode     =on         # (0:off,1:on) Bediou AR mode (off, on)
pos2-dopthres      =9          # (m) # 0, 5, 9 # cycle-slip thresh difference between doppler and carrier phase (m) (0=disable)
pos2-elmaskhold    =15         # min sat elevation to include in AR hold (deg)
pos2-gainholdamb   =0.01       # gain used for GLO and SBAS sats to adjust IC biases
pos2-gloarmode     =on         # Glonass AR mode (off, on, fix-and-hold, autocal) (0:off,1:on,2:autocal,3:fix-and-hold)
# Max age of corrections. Too high - wrong fix.
pos2-maxage        =30         # max age of differential (secs)
pos2-mindropsats   =10         # min sats required to drop sats from AR # min sats to enable excluded sat in AR
# Minimum satellites - Needed for ambiguity fixing. Higher - safer but slower.
pos2-minfixsats    =4          # min sats required for fix # min sats to fix ambiguities
pos2-minholdsats   =5          # min sats required for AR hold # min sats to hold ambiguities
pos2-niter         =1          # number of iterations in measurement update
pos2-rcvstds       =off        # adjust measurement variances with receiver stdevs
pos2-rejcode       =10         # pseudorange outlier threshold (m) 10, 12, 30
pos2-rejgdop       =30         # GDOP threshold (m)
pos2-rejionno      =1          # carrier phase outlier threshold (m)  phase bias outlier threshold (m) 1, 2, 5, 30, 1000
pos2-slipthres     =0.1        # (m) 0.05 0.1
pos2-syncsol       =off        # (0:off,1:on)
pos2-varholdamb    =0.1        # variance for fix-and-hold psuedo measurements (cycle^2) variance of fix-and-hold tracking feedback (cyc^2) 0.1

# Statistics / Kalamn filter tuning (stats-* section)
stats-clkstab      =5e-12      # satellite clock stability (s/s) 0
# Code/Phase ratio - control pseudorange vs phase weighting. . High ratio: trust carrier phase more.
stats-eratio1      =300        # ratio of input stdev of code to phase observations 300 210 100
stats-eratio2      =300        # ratio of input stdev of code to phase observations 100 300 
stats-eratio5      =300 # 25 100 300
stats-eratio6      =300
stats-errdoppler   =1         # (Hz) 1 10
# Carreier-phase noise. more trust in phase. faster fixes. 
stats-errphase     =0.003      # base term of carrier-phase input stdev (m) 0.01  0.005  0.004  0.003
stats-errphasebl   =0          # baseline term of carrier-phase input stdev (m/10km)
stats-errphaseel   =0          # (m) # 0 to 0.01, 0.005, 0.003 elevation term of carrier-phase input stdev (m)
stats-errratio     =100
stats-errrcv       =0          # ( )
stats-errsnr       =0          # (m) # 0.0 to 0.004
# Process noise:
# Acceleration noise:
# Higher - dynamic motion, Lower - static.
stats-prnaccelh    =3          # 0.125, 1, 10, 3, (m/s^2) stdev of horiz process noise for rover acc (m/s^2)
stats-prnaccelv    =1          # 1, 10, 1.0, 0.1, 0.001 (m/s^2) stdev of vert process noise for rover acc (m/s^2)
stats-prnbias      =0.01       # 0.0001, 0.001, 0.01stdev of carrier-phase process noise(m) (m)
stats-prniono      =0.01       # (m) 0.01 - 0.001
stats-prnpos       =0          # (m)
stats-prntrop      =0.001      # (m) 0.0001 - 0.001
stats-snrmax       =45         # (dB.Hz) 45-52
stats-stdbias      =30         # initial stdev for carrier-phase biases (m)
stats-stdiono      =0.03       # (m)
stats-stdtrop      =0.3        # (m)

viewMode=Detail
