Accepted=true
# Antenna 1 - Rover
ant1-antdele       =0          # (m) # Leave as zero for phone RTK.
ant1-antdeln       =0          # (m) # Leave as zero for phone RTK.
ant1-antdelu       =0          # (m) # Leave as zero for phone RTK.
ant1-anttype       =           # empty = or =* - Antenna Type - Antenna Calibration models (phase center variation) Improves centimeter-level accuracy. Empty = No correction.
ant1-pos1          =0          # (deg|m) 0 or 90
ant1-pos2          =0          # (deg|m)
ant1-pos3          =0          # (m|m) 0 or -6335367.6285
ant1-postype       =llh        # (0:llh,1:xyz,2:single,3:posfile,4:rinexhead,5:rtcm,6:raw)

# Antenna 2 - Base station
ant2-antdele       =0          # (m)
ant2-antdeln       =0          # (m)
ant2-antdelu       =0          # (m)
ant2-anttype       =           # * = use antenna type in rinex header or empty - Antenna Type - Antenna Calibration models (phase center variation) Improves centimeter-level accuracy. Empty = No correction.
ant2-initrst       =on         # (0:off,1:on) initialize base position on restart (off, on)
ant2-maxaveep      =1          # epochs to use to detrmine base position # 1 or 3600 int
ant2-pos1          =32.0657389499996  # base antenna location 1 (deg|m) - latitude
ant2-pos2          =34.801485756 # (deg|m) - longitude
ant2-pos3          =101.56799999997 # base antenna location 3 (m|m) - height
ant2-postype       =llh        # (0:llh,1:xyz,2:single,3:posfile,4:rinexhead,5:rtcm,6:raw)

console-passwd     =admin
